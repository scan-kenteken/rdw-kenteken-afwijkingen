name: Sync suspect plates

on:
  schedule:
    - cron: "0 11 * * *"
      timezone: Europe/Amsterdam
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch suspect plates
        run: curl -fsSL -o suspect-plates.json "https://api.scankenteken.nl/stats/suspect-plates.json"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add suspect-plates.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "sync suspect plates from API"
            git push
          fi
